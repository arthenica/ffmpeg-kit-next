buildscript {
    repositories {
        google()
        mavenCentral()
    }

    dependencies {
        classpath 'com.android.tools.build:gradle:8.1.0'
    }
}

rootProject.allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

apply plugin: 'com.android.library'

android {
    // Conditional for compatibility with AGP <4.2.
    if (project.android.hasProperty("namespace")) {
        namespace 'com.arthenica.ffmpegkit.flutter'
    }

    compileSdkVersion 34

    defaultConfig {
        minSdkVersion 24
        targetSdkVersion 34
        versionCode 610
        versionName "6.1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }
    lintOptions {
        disable 'GradleCompatible'
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

repositories {
    // FFmpegKit native AAR is built locally with nix-android.sh and copied as a
    // local Maven repository into android/libs-maven by copy_local_binaries.sh.
    // No remote binary repository is used.
    maven {
        url "${projectDir}/libs-maven"
    }
}

dependencies {
    implementation 'androidx.activity:activity:1.8.1'
    implementation 'androidx.annotation:annotation:1.5.0'
    // Locally built FFmpegKit AAR resolved from the android/libs-maven Maven repo.
    implementation 'com.arthenica:ffmpeg-kit-next:6.1.0'
}
